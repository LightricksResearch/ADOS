version: '3.8'
services:
  lightricks-finetune:
    image: lightricks/ados-workspace:cuda13.0-v0.0.23
    environment:
      - GCS_BUCKET=ltx-ados-2026
      - MODELS_PATH=/models
      - GCS_MOUNT_PATH=/mnt/gcs
    ports:
      - "8889:8888"
      - "7681:7681"
      - "8188:8188"
    volumes:
      - checkpoints:/mnt/data
    privileged: true
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

volumes:
  checkpoints:
